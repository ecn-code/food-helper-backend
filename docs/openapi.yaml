    CreatePlanningRequest:
      description: Payload for starting an empty planning. The inclusive date range cannot span more than 16 calendar days. The users field defaults to 1 when omitted.
      type: object
      required:
        - startDate
        - endDate
      properties:
        startDate:
          type: string
          format: date
          description: First date covered by the planning
          example: 2026-06-15
        endDate:
          type: string
          format: date
          description: Last date covered by the planning
          example: 2026-06-30
        users:
          type: integer
          format: int32
          nullable: true
          default: 1
          description: Number of users covered by the planning
          example: 4
    CreateMenuRequest:
      description: Request used to establish a planning, assign its cost, optionally confirm the exact stock allocation, and redeem planning coupons after a final server-side revalidation.
      type: object
      required:
        - payerUserId
      properties:
        payerUserId:
          type: integer
          format: int64
          description: User identifier that assumes the menu period cost
          example: 1
        stockAllocations:
          type: array
          nullable: true
          description: Optional user-confirmed stock allocation. When omitted, stock is allocated automatically by earliest expiration date. An empty list consumes no stock.
          items:
            $ref: '#/components/schemas/MenuStockAllocationRequest'
        couponCodes:
          type: array
          nullable: true
          description: Optional stable coupon codes redeemed while the menu is established.
          items:
            type: string
          example: [NO_REPEATED_PRODUCTS]
    MenuStockAllocationRequest:
      type: object
      required:
        - stockEntryId
        - usedUnits
      properties:
        stockEntryId:
          type: integer
          format: int64
          description: Stock entry identifier
          example: 7
        usedUnits:
          type: number
          minimum: 0.01
          description: Quantity to consume from this stock entry
          example: 1.5
    UpsertPlannedDayRequest:
      type: object
      required:
        - date
        - sections
      properties:
        date:
          type: string
          format: date
          description: Date of the planned day
          example: 2026-06-15
        sections:
          type: array
          description: Configured day parts selected for the day. Each day part can appear only once.
          items:
            $ref: '#/components/schemas/PlanningSectionRequest'
        recipeProductions:
          type: array
          nullable: true
          description: Recipe productions scheduled for the day. Recipes do not count as meals and instead generate stock.
          items:
            $ref: '#/components/schemas/PlanningRecipeProductionRequest'
    PlanningSectionRequest:
      type: object
      required:
        - dayPartId
        - products
      properties:
        dayPartId:
          type: integer
          format: int64
          description: Reusable day part identifier
          example: 1
        products:
          type: array
          minItems: 1
          description: Ordered products consumed in this section. Each product sortOrder must be unique within the section. A product can reference a catalog item or define a manual entry with absolute nutritional values.
          items:
            $ref: '#/components/schemas/PlanningProductRequest'
    PlanningProductRequest:
      type: object
      required:
        - sortOrder
      properties:
        productId:
          type: [integer, 'null']
          format: int64
          description: Product identifier for a catalog product. Null for a manual item.
          example: 1
        productName:
          type: [string, 'null']
          description: Visible name for a manual item. Null for a catalog product.
          example: Homemade fruit bowl
        units:
          type: number
          exclusiveMinimum: 0
          nullable: true
          description: Consumed units. Optional for catalog products. Must be null for manual items.
          example: 2
        grams:
          type: number
          exclusiveMinimum: 0
          nullable: true
          description: Consumed grams. Optional for catalog products when overriding the default conversion. Must be null for manual items.
          example: 300
        calories:
          type: number
          nullable: true
          description: Manual calories for the full line. Required when productId is null.
          example: 180
        carbohydrates:
          type: number
          nullable: true
          description: Manual carbohydrates for the full line. Required when productId is null.
          example: 24
        proteins:
          type: number
          nullable: true
          description: Manual proteins for the full line. Required when productId is null.
          example: 5
        fats:
          type: number
          nullable: true
          description: Manual fats for the full line. Required when productId is null.
          example: 6
        sortOrder:
          type: integer
          format: int32
          minimum: 0
          description: Explicit display order within the section. Must be unique among products in the same section.
          example: 10
    PlanningRecipeProductionRequest:
      type: object
      required:
        - recipeId
        - units
        - sortOrder
      properties:
        recipeId:
          type: integer
          format: int64
          description: Recipe identifier
          example: 12
        units:
          type: number
          exclusiveMinimum: 0
          description: Produced units that become product stock
          example: 4
        sortOrder:
          type: integer
          format: int32
          minimum: 0
          description: Explicit display order within the day. Must be unique among recipe productions in the same day.
          example: 10
    PlanningSummaryResponse:
      type: object
      required: [id, startDate, endDate, plannedDays, state]
      properties:
        id:
          type: integer
          format: int64
          example: 42
        startDate:
          type: string
          format: date
          example: 2026-06-15
        endDate:
          type: string
          format: date
          example: 2026-06-21
        plannedDays:
          type: integer
          format: int32
          minimum: 0
          description: Number of explicitly planned days
          example: 5
        state:
          type: string
          enum: [DRAFT, ESTABLISHED, CLOSED]
