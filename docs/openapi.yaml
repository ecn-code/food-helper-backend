openapi: 3.1.0
info:
  title: FoodHelper API
  version: v1
  description: API for managing products, recipes, and nutritional calculations.
servers:
  - url: /
    description: Current server
tags:
  - name: Authentication
    description: User registration and stateless JWT login
  - name: Products
    description: Create, update, delete, and inspect product statistics
  - name: Stock
    description: Manage stock entries and inspect inventory ordered by expiration
  - name: Recipes
    description: List, create, update, delete, derive product, and inspect recipe statistics
  - name: Proposed week menus
    description: Draft weekly menu planning before a menu becomes final
  - name: Proposed week menu day parts
    description: Configure reusable day parts used by proposed menus
  - name: Media
    description: Download stored media files
  - name: Health
    description: Basic API status
paths:
  /api/v1/auth/register:
    post:
      tags:
        - Authentication
      summary: Register user
      description: Creates a user when the registration code is valid and returns a signed Bearer JWT.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              default:
                value:
                  username: elias
                  password: correct-horse-battery-staple
                  registrationCode: foodhelper-invite
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request or registration code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/auth/login:
    post:
      tags:
        - Authentication
      summary: Log in
      description: Validates credentials and returns a signed Bearer JWT for Authorization headers.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                value:
                  username: elias
                  password: correct-horse-battery-staple
      responses:
        '200':
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid credentials or request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/products:
    get:
      tags:
        - Products
      summary: List products
      description: Returns a paginated list of products ordered by identifier ascending.
      operationId: listProducts
      parameters:
        - name: page
          in: query
          required: false
          description: Zero-based page number
          schema:
            type: integer
            format: int32
            default: 0
        - name: size
          in: query
          required: false
          description: Number of items per page, between 1 and 100
          schema:
            type: integer
            format: int32
            default: 20
      responses:
        '200':
          description: Products returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPageResponse'
    post:
      tags:
        - Products
      summary: Create product
      description: Creates a product with name, description, nutritional values per 100 grams, and an optional default price.
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
            examples:
              default:
                value:
                  name: Apple
                  description: Fresh apple
                  gramsPerUnit: 150
                  calories: 52
                  carbohydrates: 14
                  proteins: 0.3
                  fats: 0.2
                  defaultPrice: 2.49
                  photo:
                    fileName: apple.png
                    contentType: image/png
                    base64Data: iVBORw0KGgoAAAANSUhEUgAA...
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflict while creating the product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/products/stats:
    get:
      tags:
        - Products
      summary: Product statistics
      description: Returns aggregated product and stock statistics calculated on the server from the current database state.
      operationId: productStats
      responses:
        '200':
          description: Product statistics returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductStatsResponse'
  /api/v1/products/{id}:
    put:
      tags:
        - Products
      summary: Update product
      description: Updates an existing product, replaces its nutritional data per 100 grams, and can change its optional default price.
      operationId: updateProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
            examples:
              default:
                value:
                  name: Green Apple
                  description: Green apple
                  gramsPerUnit: 140
                  calories: 48
                  carbohydrates: 13
                  proteins: 0.4
                  fats: 0.1
                  defaultPrice: 2.79
                  photo:
                    fileName: green-apple.png
                    contentType: image/png
                    base64Data: iVBORw0KGgoAAAANSUhEUgAA...
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflict while updating the product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags:
        - Products
      summary: Delete product
      description: Deletes a product by identifier.
      operationId: deleteProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Product deleted
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/products/{productId}/stock:
    post:
      tags:
        - Stock
      summary: Create stock entry
      description: Creates a stock entry for a product with a positive quantity, a required price, an optional expiration date, and a required entry date.
      operationId: createStockEntry
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStockEntryRequest'
            examples:
              default:
                value:
                  quantity: 6.5
                  price: 4.99
                  expirationDate: 2026-06-20
                  entryDate: 2026-06-10
      responses:
        '201':
          description: Stock entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockEntryResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    get:
      tags:
        - Stock
      summary: List stock entries for product
      description: Returns stock entries for a single product ordered by expiration date ascending, optionally filtering by expiration date.
      operationId: listStockEntriesByProduct
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: expiresBefore
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Only include stock entries with expiration date strictly before this date
      responses:
        '200':
          description: Product stock entries ordered by expiration
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StockEntryResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/stock:
    get:
      tags:
        - Stock
      summary: List stock entries
      description: Returns stock entries ordered by expiration date ascending, with optional filters by expiration date and product identifiers.
      operationId: listStockEntries
      parameters:
        - name: expiresBefore
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Only include stock entries with expiration date strictly before this date
        - name: productIds
          in: query
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int64
          style: form
          explode: false
          description: Optional product identifiers to filter stock entries
      responses:
        '200':
          description: Stock entries ordered by expiration
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StockEntryResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/stock/{stockEntryId}/add:
    post:
      tags:
        - Stock
      summary: Add quantity to stock entry
      description: Adds a positive quantity to an existing stock entry.
      operationId: addStockQuantity
      parameters:
        - name: stockEntryId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdjustStockQuantityRequest'
            examples:
              default:
                value:
                  quantity: 2
      responses:
        '200':
          description: Stock entry updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockEntryResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Stock entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/stock/{stockEntryId}/remove:
    post:
      tags:
        - Stock
      summary: Remove quantity from stock entry
      description: Removes a positive quantity from a stock entry. If the remaining quantity becomes zero, the stock entry is deleted.
      operationId: removeStockQuantity
      parameters:
        - name: stockEntryId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdjustStockQuantityRequest'
            examples:
              default:
                value:
                  quantity: 2
      responses:
        '200':
          description: Stock quantity removed
        '400':
          description: Invalid request or quantity exceeds current stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Stock entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/recipes:
    get:
      tags:
        - Recipes
      summary: List recipes
      description: Returns a paginated list of recipes ordered by identifier ascending, including calculated nutritional totals, ingredients, and optional derived product information.
      operationId: listRecipes
      parameters:
        - name: page
          in: query
          required: false
          description: Zero-based page number
          schema:
            type: integer
            format: int32
            default: 0
        - name: size
          in: query
          required: false
          description: Number of items per page, between 1 and 100
          schema:
            type: integer
            format: int32
            default: 20
      responses:
        '200':
          description: Recipes returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipePageResponse'
    post:
      tags:
        - Recipes
      summary: Create recipe
      description: Creates a recipe from existing products and calculates nutritional totals from assigned grams.
      operationId: createRecipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecipeRequest'
            examples:
              default:
                value:
                  name: Curry
                  description: Creamy homemade curry
                  instructions: Cook all ingredients together.
                  products:
                    - productId: 1
                      grams: 200
                    - productId: 2
                      grams: 100
      responses:
        '201':
          description: Recipe created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: One or more ingredient products were not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflict while creating the recipe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/recipes/stats:
    get:
      tags:
        - Recipes
      summary: Recipe statistics
      description: Returns aggregated recipe metrics calculated on the server from the current database state.
      operationId: recipeStats
      responses:
        '200':
          description: Recipe statistics returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeStatsResponse'
  /api/v1/recipes/{id}:
    put:
      tags:
        - Recipes
      summary: Update recipe
      description: Updates a recipe, recalculates nutritional totals, and synchronizes its derived product if it exists.
      operationId: updateRecipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRecipeRequest'
            examples:
              default:
                value:
                  name: Curry
                  description: Creamy homemade curry
                  instructions: Cook all ingredients together.
                  products:
                    - productId: 1
                      grams: 250
                    - productId: 2
                      grams: 100
      responses:
        '200':
          description: Recipe updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Recipe or one of its ingredient products was not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflict while updating the recipe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags:
        - Recipes
      summary: Delete recipe
      description: Deletes a recipe. If a derived product exists, it is deleted too.
      operationId: deleteRecipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Recipe deleted
        '404':
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/recipes/{id}/derived-product:
    post:
      tags:
        - Recipes
      summary: Create derived product from recipe
      description: Creates a product from a recipe once and stores the yield metadata used to calculate produced units.
      operationId: createDerivedProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecipeDerivedProductRequest'
            examples:
              default:
                value:
                  producedGrams: 400
                  gramsPerUnit: 100
      responses:
        '201':
          description: Derived product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeDerivedProductResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Derived product already exists or product name conflicts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/proposed-week-menus:
    post:
      tags:
        - Proposed week menus
      summary: Create proposed week menu
      description: Starts an empty proposed week menu with a date range. The range must fit within a single week, and proposed menus can contain only the days planned so far.
      operationId: createProposedWeekMenu
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProposedWeekMenuRequest'
            examples:
              default:
                value:
                  startDate: 2026-06-15
                  endDate: 2026-06-21
      responses:
        '201':
          description: Proposed week menu created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposedWeekMenuResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/proposed-week-menus/{id}:
    get:
      tags:
        - Proposed week menus
      summary: Get proposed week menu
      description: Returns one proposed week menu with ordered days, sections, products, nutritional totals, and a stock preview summary.
      operationId: getProposedWeekMenu
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Proposed week menu returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposedWeekMenuResponse'
        '404':
          description: Proposed week menu not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/proposed-week-menus/{id}/days:
    put:
      tags:
        - Proposed week menus
      summary: Create or replace proposed day menu
      description: Creates or replaces one proposed day menu. Sections and products keep the explicit order supplied in the request.
      operationId: upsertProposedWeekMenuDay
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertProposedWeekMenuDayRequest'
            examples:
              default:
                value:
                  date: 2026-06-15
                  sections:
                    - dayPartId: 1
                      products:
                        - productId: 1
                          units: 1
                          grams: 200
                          sortOrder: 10
                    - dayPartId: 2
                      products:
                        - productId: 2
                          units: 2
                          sortOrder: 10
      responses:
        '200':
          description: Proposed week menu updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposedWeekMenuResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Proposed week menu or product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/proposed-week-menu-day-parts:
    get:
      tags:
        - Proposed week menu day parts
      summary: List proposed week menu day parts
      description: Returns all reusable day parts ordered by the configured sort order and identifier.
      operationId: listProposedWeekMenuDayParts
      responses:
        '200':
          description: Day parts returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProposedWeekMenuDayPartResponse'
    post:
      tags:
        - Proposed week menu day parts
      summary: Create proposed week menu day part
      description: Creates a reusable day part that can later be referenced by proposed menu days.
      operationId: createProposedWeekMenuDayPart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProposedWeekMenuDayPartRequest'
            examples:
              default:
                value:
                  name: Lunch
                  description: Main meal of the day
                  sortOrder: 20
      responses:
        '201':
          description: Day part created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposedWeekMenuDayPartResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/proposed-week-menu-day-parts/{id}:
    put:
      tags:
        - Proposed week menu day parts
      summary: Update proposed week menu day part
      description: Updates an existing reusable day part configuration.
      operationId: updateProposedWeekMenuDayPart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProposedWeekMenuDayPartRequest'
            examples:
              default:
                value:
                  name: Snack
                  description: Afternoon snack
                  sortOrder: 30
      responses:
        '200':
          description: Day part updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProposedWeekMenuDayPartResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Day part not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/media/{id}:
    get:
      tags:
        - Media
      summary: Download media
      description: Returns the binary content of a stored media file.
      operationId: downloadMedia
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: expiresAt
          in: query
          required: false
          description: Unix epoch seconds when the signed media URL expires. Required when the request does not include a Bearer token.
          schema:
            type: integer
            format: int64
          example: 1781611200
        - name: signature
          in: query
          required: false
          description: HMAC signature for direct media downloads. Required when the request does not include a Bearer token.
          schema:
            type: string
          example: 5f2a...
      responses:
        '200':
          description: Media returned
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        '404':
          description: Media not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/health:
    get:
      tags:
        - Health
      summary: API status
      description: Returns a simple availability indicator.
      operationId: health
      responses:
        '200':
          description: API available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                default:
                  value:
                    status: UP
components:
  schemas:
    ApiError:
      type: object
      properties:
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Invalid request body
        path:
          type: string
          example: /api/v1/products
        timestamp:
          type: string
          format: date-time
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: UP
    RegisterRequest:
      type: object
      required:
        - username
        - password
        - registrationCode
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 80
          description: Unique username used to log in
          example: elias
        password:
          type: string
          minLength: 8
          maxLength: 128
          description: Plain password. It is hashed before storage.
          example: correct-horse-battery-staple
        registrationCode:
          type: string
          maxLength: 128
          description: Shared registration code required to create a user
          example: foodhelper-invite
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Registered username
          example: elias
        password:
          type: string
          description: User password
          example: correct-horse-battery-staple
    AuthResponse:
      type: object
      properties:
        userId:
          type: integer
          format: int64
          description: Created or authenticated user identifier
          example: 1
        username:
          type: string
          description: Authenticated username
          example: elias
        accessToken:
          type: string
          description: JWT access token for Authorization headers
        tokenType:
          type: string
          description: Authorization scheme
          example: Bearer
        expiresAt:
          type: string
          format: date-time
          description: Instant when the access token expires
    CreateProductRequest:
      type: object
      required:
        - name
        - description
        - gramsPerUnit
        - calories
        - carbohydrates
        - proteins
        - fats
      properties:
