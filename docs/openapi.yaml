openapi: 3.1.0
info:
  title: FoodHelper API
  version: v1
  description: API for managing products, recipes, and nutritional calculations.
servers:
  - url: /
    description: Current server
security:
  - bearerAuth: []
tags:
  - name: Authentication
    description: User registration and stateless JWT login
  - name: Products
    description: Create, update, delete, and inspect product statistics
  - name: Supermarkets
    description: Manage supermarkets associated with products and shopping lists
  - name: Stock
    description: Manage live stock entries, inspect inventory ordered by expiration, and review historical stock movements
  - name: User money boxes
    description: Inspect user money boxes and register signed money movements
  - name: User weights
    description: Record user weights and inspect measurements and statistics by period
  - name: Money boxes
    description: Manage user-owned and manually created money boxes in one collection
  - name: Recipes
    description: List, create, update, delete, derive product, and inspect recipe statistics
  - name: Planning
    description: Plan menus, schedule recipe productions, and configure reusable day parts for flexible date ranges
  - name: Menus
    description: Inspect menus created from planning and transfer recipe productions to stock
  - name: Nutritional rules
    description: Configure daily nutritional minimums and maximums
  - name: Media
    description: Download stored media files
  - name: Health
    description: Basic API status
paths:
  /api/v1/auth/register:
    post:
      security: []
      tags:
        - Authentication
      summary: Register user
      description: Creates a user when the registration code is valid and returns a signed Bearer JWT.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              default:
                value:
                  username: elias
                  password: correct-horse-battery-staple
                  registrationCode: foodhelper-invite
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid request or registration code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/auth/login:
    post:
      security: []
      tags:
        - Authentication
      summary: Log in
      description: Validates credentials and returns a signed Bearer JWT for Authorization headers.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                value:
                  username: elias
                  password: correct-horse-battery-staple
      responses:
        '200':
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid credentials or request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/supermarkets:
    get:
      tags:
        - Supermarkets
      summary: List supermarkets
      operationId: listSupermarkets
      responses:
        '200':
          description: Supermarkets returned in name order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SupermarketResponse'
    post:
      tags:
        - Supermarkets
      summary: Create supermarket
      operationId: createSupermarket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupermarketRequest'
      responses:
        '201':
          description: Supermarket created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupermarketResponse'
        '400':
          description: Invalid request or overlapping planning
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Supermarket name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/supermarkets/{id}:
    get:
      tags:
        - Supermarkets
      summary: Get supermarket
      operationId: getSupermarket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Supermarket returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupermarketResponse'
        '404':
          description: Supermarket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    put:
      tags:
        - Supermarkets
      summary: Update supermarket
      operationId: updateSupermarket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupermarketRequest'
      responses:
        '200':
          description: Supermarket updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupermarketResponse'
        '404':
          description: Supermarket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Supermarket name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags:
        - Supermarkets
      summary: Delete supermarket
      description: Deletes a supermarket only when it is not assigned to products.
      operationId: deleteSupermarket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Supermarket deleted
        '404':
          description: Supermarket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Supermarket is assigned to products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/products:
    get:
      tags:
        - Products
      summary: List products
      description: Returns a paginated list of products ordered by identifier ascending. Optional filters are combined with AND, min/max values are inclusive, and search matches product name and description.
      operationId: listProducts
      parameters:
        - name: page
          in: query
          required: false
          description: Zero-based page number
          schema:
            type: integer
            format: int32
            default: 0
        - name: size
          in: query
          required: false
          description: Number of items per page, between 1 and 100
          schema:
            type: integer
            format: int32
            default: 20
        - name: search
          in: query
          required: false
          description: Free text search applied to product name and description after trimming and lowercasing
          example: apple
          schema:
            type: string
        - name: caloriesMin
          in: query
          required: false
          description: Minimum calories per 100 grams, inclusive
          example: 50
          schema:
            type: number
        - name: caloriesMax
          in: query
          required: false
          description: Maximum calories per 100 grams, inclusive
          example: 200
          schema:
            type: number
        - name: carbohydratesMin
          in: query
          required: false
          description: Minimum carbohydrates per 100 grams, inclusive
          example: 10
          schema:
            type: number
        - name: carbohydratesMax
          in: query
          required: false
          description: Maximum carbohydrates per 100 grams, inclusive
          example: 30
          schema:
            type: number
        - name: proteinsMin
          in: query
          required: false
          description: Minimum proteins per 100 grams, inclusive
          example: 1
          schema:
            type: number
        - name: proteinsMax
          in: query
          required: false
          description: Maximum proteins per 100 grams, inclusive
          example: 40
          schema:
            type: number
        - name: fatsMin
          in: query
          required: false
          description: Minimum fats per 100 grams, inclusive
          example: 0
          schema:
            type: number
        - name: fatsMax
          in: query
          required: false
          description: Maximum fats per 100 grams, inclusive
          example: 10
          schema:
            type: number
      responses:
        '200':
          description: Products returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPageResponse'
    post:
      tags:
        - Products
      summary: Create product
      description: Creates a product with name, description, nutritional values per 100 grams, an optional default price, and zero or more supermarket assignments.
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
            examples:
              default:
                value:
                  name: Apple
                  description: Fresh apple
                  gramsPerUnit: 150
                  calories: 52
                  carbohydrates: 14
                  proteins: 0.3
                  fats: 0.2
                  defaultPrice: 2.49
                  supermarketIds: [1, 2]
                  photo:
                    fileName: apple.png
                    contentType: image/png
                    base64Data: iVBORw0KGgoAAAANSUhEUgAA...
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Assigned supermarket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflict while creating the product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/products/stats:
    get:
      tags:
        - Products
      summary: Product statistics
      description: Returns aggregated product and stock statistics calculated on the server from the current database state.
      operationId: productStats
      responses:
        '200':
          description: Product statistics returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductStatsResponse'
  /api/v1/products/{id}:
    get:
      tags:
        - Products
      summary: Get product
      description: Returns a single product by identifier, including derived product data when the product comes from a recipe.
      operationId: getProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Product returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    put:
      tags:
        - Products
      summary: Update product
      description: Updates an existing product and replaces its nutritional data and supermarket assignments.
      operationId: updateProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
            examples:
              default:
                value:
                  name: Green Apple
                  description: Green apple
                  gramsPerUnit: 140
                  calories: 48
                  carbohydrates: 13
                  proteins: 0.4
                  fats: 0.1
                  defaultPrice: 2.79
                  supermarketIds: [2]
                  photo:
                    fileName: green-apple.png
                    contentType: image/png
                    base64Data: iVBORw0KGgoAAAANSUhEUgAA...
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Product or assigned supermarket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflict while updating the product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags:
        - Products
      summary: Delete product
      description: Deletes a product by identifier.
      operationId: deleteProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Product deleted
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/products/{productId}/stock:
    post:
      tags:
        - Stock
      summary: Create stock entry
      description: Creates a stock entry for a product with a positive quantity, a required price, an optional expiration date, and a required entry date.
      operationId: createStockEntry
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStockEntryRequest'
            examples:
              default:
                value:
                  quantity: 6.5
                  price: 4.99
                  expirationDate: 2026-06-20
                  entryDate: 2026-06-10
      responses:
        '201':
          description: Stock entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockEntryResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    get:
      tags:
        - Stock
      summary: List stock entries for product
      description: Returns stock entries for a single product ordered by expiration date ascending, optionally filtering by expiration date.
      operationId: listStockEntriesByProduct
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: expiresBefore
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Only include stock entries with expiration date strictly before this date
      responses:
        '200':
          description: Product stock entries ordered by expiration
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StockEntryResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/stock/{stockEntryId}:
    put:
      tags:
        - Stock
      summary: Update stock entry
      description: "Updates the editable fields of an existing stock entry: quantity, price, expiration date, and entry date. The linked product stays unchanged."
      operationId: updateStockEntry
      parameters:
        - name: stockEntryId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStockEntryRequest'
            examples:
              default:
                value:
                  quantity: 7.25
                  price: 5.49
                  expirationDate: 2026-06-25
                  entryDate: 2026-06-11
      responses:
        '200':
          description: Stock entry updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockEntryResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Stock entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/stock:
    get:
      tags:
        - Stock
      summary: List stock entries
      description: Returns stock entries ordered by expiration date ascending, with optional filters by expiration date and product identifiers.
      operationId: listStockEntries
      parameters:
        - name: expiresBefore
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Only include stock entries with expiration date strictly before this date
        - name: productIds
          in: query
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int64
          style: form
          explode: false
          description: Optional product identifiers to filter stock entries
      responses:
        '200':
          description: Stock entries ordered by expiration
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StockEntryResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/stock/movements:
    get:
      tags:
        - Stock
      summary: List stock movements
      description: Returns the historical stock ledger ordered by effective date and recorded timestamp descending, with optional filters by date range and product identifiers.
      operationId: listStockMovements
      parameters:
        - name: fromDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Inclusive start date for the history filter
        - name: toDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Inclusive end date for the history filter
        - name: productIds
          in: query
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int64
          style: form
          explode: false
          description: Optional product identifiers to filter stock movements
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
          description: Zero-based page number
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 20
          description: Number of items per page, between 1 and 100
      responses:
        '200':
          description: Historical stock movements returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockMovementPageResponse'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/stock/{stockEntryId}/add:
    post:
      tags:
        - Stock
      summary: Add quantity to stock entry
      description: Adds a positive quantity to an existing stock entry.
      operationId: addStockQuantity
      parameters:
        - name: stockEntryId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdjustStockQuantityRequest'
            examples:
              default:
                value:
                  quantity: 2
      responses:
        '200':
          description: Stock entry updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockEntryResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Stock entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/stock/{stockEntryId}/remove:
    post:
      tags:
        - Stock
      summary: Remove quantity from stock entry
      description: Removes a positive quantity from a stock entry. If the remaining quantity becomes zero, the stock entry is deleted.
      operationId: removeStockQuantity
      parameters:
        - name: stockEntryId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdjustStockQuantityRequest'
            examples:
              default:
                value:
                  quantity: 2
      responses:
        '200':
          description: Stock quantity removed
        '400':
          description: Invalid request or quantity exceeds current stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Stock entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/products/{productId}/stock/reconciliation:
    get:
      tags:
        - Stock
      summary: Reconcile stock for product
      description: Compares the historical quantity calculated from the stock ledger with the live stock quantity stored in current stock entries.
      operationId: reconcileStock
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Stock reconciliation returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockReconciliationResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/recipes:
    get:
      tags:
        - Recipes
      summary: List recipes
      description: Returns a paginated list of recipes ordered by identifier ascending, including calculated nutritional totals, ingredients, and optional derived product information.
      operationId: listRecipes
      parameters:
        - name: page
          in: query
          required: false
          description: Zero-based page number
          schema:
            type: integer
            format: int32
            default: 0
        - name: size
          in: query
          required: false
          description: Number of items per page, between 1 and 100
          schema:
            type: integer
            format: int32
            default: 20
        - name: search
          in: query
          required: false
          description: Accent- and case-insensitive text searched in name, description, instructions, and ingredients
          schema:
            type: string
        - name: caloriesMin
          in: query
          required: false
          schema: { type: number, minimum: 0 }
        - name: caloriesMax
          in: query
          required: false
          schema: { type: number, minimum: 0 }
        - name: carbohydratesMin
          in: query
          required: false
          schema: { type: number, minimum: 0 }
        - name: carbohydratesMax
          in: query
          required: false
          schema: { type: number, minimum: 0 }
        - name: proteinsMin
          in: query
          required: false
          schema: { type: number, minimum: 0 }
        - name: proteinsMax
          in: query
          required: false
          schema: { type: number, minimum: 0 }
        - name: fatsMin
          in: query
          required: false
          schema: { type: number, minimum: 0 }
        - name: fatsMax
          in: query
          required: false
          schema: { type: number, minimum: 0 }
        - name: hasDerivedProduct
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Recipes returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipePageResponse'
        '400':
          description: Invalid pagination, negative range, or minimum greater than maximum
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    post:
      tags:
        - Recipes
      summary: Create recipe
      description: Creates a recipe from existing products and calculates nutritional totals from assigned quantities.
      operationId: createRecipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecipeRequest'
            examples:
              default:
                value:
                  name: Curry
                  description: Creamy homemade curry
                  instructions: Cook all ingredients together.
                  products:
                    - productId: 1
                      quantity: 200
                      quantityType: GRAMS
                    - productId: 2
                      quantity: 100
                      quantityType: GRAMS
      responses:
        '201':
          description: Recipe created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: One or more ingredient products were not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflict while creating the recipe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/recipes/stats:
    get:
      tags:
        - Recipes
      summary: Recipe statistics
      description: Returns aggregated recipe metrics calculated on the server from the current database state.
      operationId: recipeStats
      responses:
        '200':
          description: Recipe statistics returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeStatsResponse'
  /api/v1/recipes/{id}:
    put:
      tags:
        - Recipes
      summary: Update recipe
      description: Updates a recipe, recalculates nutritional totals, and synchronizes its derived product if it exists. If a stock mode is provided, it also switches the derived product between component stock and self stock.
      operationId: updateRecipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRecipeRequest'
            examples:
              default:
                value:
                  name: Curry
                  description: Creamy homemade curry
                  instructions: Cook all ingredients together.
                  products:
                    - productId: 1
                      quantity: 250
                      quantityType: GRAMS
                    - productId: 2
                      quantity: 100
                      quantityType: GRAMS
                  stockFromComposition: false
      responses:
        '200':
          description: Recipe updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Recipe or one of its ingredient products was not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflict while updating the recipe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags:
        - Recipes
      summary: Delete recipe
      description: Deletes a recipe. If a derived product exists, it is deleted too.
      operationId: deleteRecipe
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Recipe deleted
        '404':
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/recipes/{id}/derived-product:
    post:
      tags:
        - Recipes
      summary: Create derived product from recipe
      description: Creates a product from a recipe once, lets the caller choose the derived product name and stock mode, stores the yield metadata used to calculate produced units, and keeps the derived product synchronized with future recipe changes.
      operationId: createDerivedProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRecipeDerivedProductRequest'
            examples:
              default:
                value:
                  name: Curry base
                  units: 4
                  stockFromComposition: true
      responses:
        '201':
          description: Derived product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecipeDerivedProductResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Derived product already exists or product name conflicts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/money-boxes:
    get:
      tags:
        - Money boxes
      summary: List all money boxes
      description: Returns user-owned and manually created money boxes in one list, including balances and movements.
      operationId: listMoneyBoxes
      responses:
        '200':
          description: Money boxes returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MoneyBoxResponse'
    post:
      tags:
        - Money boxes
      summary: Create manual money box
      description: Creates a money box that is not owned by a user.
      operationId: createManualMoneyBox
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMoneyBoxRequest'
            examples:
              default:
                value:
                  name: Household cash
      responses:
        '201':
          description: Manual money box created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MoneyBoxResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Manual money box name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/money-boxes/{moneyBoxId}:
    get:
      tags:
        - Money boxes
      summary: Get money box
      description: Returns one user-owned or manual money box by identifier.
      operationId: getMoneyBox
      parameters:
        - name: moneyBoxId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Money box returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MoneyBoxResponse'
        '404':
          description: Money box not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags:
        - Money boxes
      summary: Delete manual money box
      description: Deletes a manual money box and all its movements in one transaction. User-owned money boxes cannot be deleted.
      operationId: deleteManualMoneyBox
      parameters:
        - name: moneyBoxId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Manual money box deleted
        '404':
          description: Money box not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: User-owned money box cannot be deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/money-boxes/{moneyBoxId}/movements:
    post:
      tags:
        - Money boxes
      summary: Add money box movement
      description: Adds a signed movement to a user-owned or manual money box.
      operationId: addMoneyBoxMovement
      parameters:
        - name: moneyBoxId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserMoneyMovementRequest'
      responses:
        '201':
          description: Money movement created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MoneyBoxMovementResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Money box not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/money-boxes/{moneyBoxId}/movements/{movementId}:
    delete:
      tags:
        - Money boxes
      summary: Delete money box movement
      description: Deletes a movement only when it belongs to the selected money box and is not linked to a menu.
      operationId: deleteMoneyBoxMovement
      parameters:
        - name: moneyBoxId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: movementId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Money movement deleted
        '404':
          description: Money box movement not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Money movement is linked to a menu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/users/{userId}/money-box:
    get:
      tags:
        - User money boxes
      summary: Get user money box
      description: Returns the user's current money box balance and signed movements ordered from newest to oldest.
      operationId: getUserMoneyBox
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Money box returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMoneyBoxResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/users/{userId}/money-box/movements:
    post:
      tags:
        - User money boxes
      summary: Add user money movement
      description: Adds a signed money movement to the user's money box. Positive amounts increase the balance and negative amounts decrease it.
      operationId: addUserMoneyMovement
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserMoneyMovementRequest'
            examples:
              addMoney:
                value:
                  amount: 25.00
                  description: Initial contribution
              subtractMoney:
                value:
                  amount: -12.50
                  description: Grocery adjustment
      responses:
        '201':
          description: Money movement created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMoneyMovementResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/nutritional-rules:
    get:
      tags:
        - Nutritional rules
      summary: Get nutritional rules
      description: Returns the saved daily and weekly minimum and maximum for each nutrient. Unconfigured limits are null.
      operationId: getNutritionalRules
      responses:
        '200':
          description: Nutritional rules returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutritionalRulesResponse'
    put:
      tags:
        - Nutritional rules
      summary: Save nutritional rules
      description: Replaces the daily and weekly limits. Each nutrient may define a minimum, a maximum, both, or neither in each period.
      operationId: saveNutritionalRules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveNutritionalRulesRequest'
      responses:
        '200':
          description: Nutritional rules saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NutritionalRulesResponse'
        '400':
          description: Invalid limits
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/planning:
    get:
      tags:
        - Planning
      summary: List planning
      description: Returns compact planning summaries ordered by start date descending, without days, products, or calculated totals.
      operationId: listPlanning
      responses:
        '200':
          description: Planning summaries returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlanningSummaryResponse'
    post:
      tags:
        - Planning
      summary: Create planning
      description: Starts an empty planning with an inclusive date range and a user count used to scale stock requirements. The range may cover up to 16 calendar days, and planning can contain only the days planned so far.
      operationId: createPlanning
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlanningRequest'
            examples:
              default:
                value:
                  startDate: 2026-06-15
                  endDate: 2026-06-30
                  users: 4
      responses:
        '201':
          description: Planning created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanningResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/planning/{id}:
    get:
      tags:
        - Planning
      summary: Get planning
      description: Returns one planning with ordered days, sections, products, nutritional totals, and a stock preview summary.
      operationId: getPlanning
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Planning returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanningResponse'
        '404':
          description: Planning not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags:
        - Planning
      summary: Delete planning
      description: Deletes a planning by identifier. Related days, sections, products, and established menu snapshots are removed automatically.
      operationId: deletePlanning
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Planning deleted
        '404':
          description: Planning not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/planning/{id}/days:
    put:
      tags:
        - Planning
      summary: Create or replace planned day
      description: Creates or replaces one planned day. Sections and products keep the explicit order supplied in the request, product sortOrder values must be unique within each section, manual items can add absolute nutrition without a catalog product, and manual items must not include units or grams.
      operationId: upsertPlanningDay
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertPlannedDayRequest'
            examples:
              default:
                value:
                  date: 2026-06-15
                  sections:
                    - dayPartId: 1
                      products:
                        - productId: 1
                          units: 1
                          grams: 200
                          sortOrder: 10
                        - productName: Homemade fruit bowl
                          calories: 180
                          carbohydrates: 24
                          proteins: 5
                          fats: 6
                          sortOrder: 20
                    - dayPartId: 2
                      products:
                        - productId: 2
                          units: 2
                          sortOrder: 10
      responses:
        '200':
          description: Planning updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanningResponse'
        '400':
          description: Invalid request or manual quantity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Planning or product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/planning/{id}/menu:
    post:
      tags:
        - Planning
      summary: Create menu from planning
      description: Consumes the user-confirmed stock allocation, or automatically uses the earliest expiration date when no allocation is supplied. It creates a menu snapshot, stores missing products as a shopping list, subtracts the applied stock cost from the selected payer user's money box, revalidates the requested planning coupons on the server, and can redeem one or more planning coupons that add money back to the payer's money box.
      operationId: createMenuFromPlanning
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
              schema:
              $ref: '#/components/schemas/CreateMenuRequest'
            examples:
              default:
                value:
                  payerUserId: 1
                  stockAllocations:
                    - stockEntryId: 7
                      usedUnits: 1.5
                  couponCodes:
                    - NO_REPEATED_PRODUCTS
      responses:
        '201':
          description: Menu created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Planning or payer user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/planning/{id}/coupons:
    get:
      tags:
        - Planning
      summary: List planning-eligible coupons
      description: Returns the configured coupons whose rules are satisfied by the requested planning, together with their cooldown status for the payer user.
      operationId: listPlanningCoupons
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: payerUserId
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Planning coupons returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlanningCouponResponse'
        '404':
          description: Planning or payer user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/coupons:
    get:
      tags:
        - Coupons
      summary: List global coupon catalog
      description: Returns every configured coupon for the requested payer user. Use onlyAvailable=true to keep only coupons that can be redeemed right now.
      operationId: listCoupons
      parameters:
        - name: payerUserId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: onlyAvailable
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Coupons returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CouponResponse'
        '404':
          description: Payer user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/planning/{id}/coupons/validate:
    post:
      tags:
        - Planning
      summary: Validate selected planning coupons
      description: Recomputes coupon eligibility from the current planning and returns only the requested coupons that are truly available. No state is changed and nothing is persisted.
      operationId: validatePlanningCoupons
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidatePlanningCouponsRequest'
      responses:
        '200':
          description: Selectable planning coupons returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlanningCouponResponse'
        '400':
          description: Invalid request or coupon not allowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Planning or payer user not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/menus:
    get:
      tags:
        - Menus
      summary: List menus
      description: Returns a paginated list of menu snapshots with lifecycle state and action flags, ordered by start date descending and identifier as a stable tiebreaker.
      operationId: listMenus
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
          description: Zero-based page number
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 20
          description: Number of items per page, between 1 and 100
        - name: state
          in: query
          required: false
          schema:
            type: string
            enum: [CLOSED, ESTABLISHED]
          description: Optional menu state filter
      responses:
        '200':
          description: Menus returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuPageResponse'
  /api/v1/menus/{id}:
    get:
      tags:
        - Menus
      summary: Get menu
      description: Returns one menu snapshot with lifecycle state, action flags, ordered days, nutritional totals, rule evaluation, stock summary, consumed stock, missing products, and assigned people when available.
      operationId: getMenu
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Menu returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuResponse'
        '404':
          description: Menu not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags:
        - Menus
      summary: Undo menu creation
      description: Returns every consumed quantity to its original stock entry, removes the linked money movement, and deletes the open menu so its planning can be established again. Closed menus cannot be undone.
      operationId: undoMenuCreation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Menu creation undone
        '400':
          description: Closed menu cannot be undone
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Menu not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/menus/{id}/recipe-productions/{recipeProductionId}/transfer:
    post:
      tags:
        - Menus
      summary: Transfer recipe production to stock
      description: Creates a stock entry from one recipe production in the menu, records the transfer trace in the menu snapshot, and refuses to transfer the same production more than once.
      operationId: transferMenuRecipeProduction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: recipeProductionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Recipe production transferred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuResponse'
        '400':
          description: Menu cannot be modified or the recipe production was already transferred
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Menu or recipe production not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/menus/{id}/used-stock:
    get:
      tags:
        - Menus
      summary: List used stock for menu
      description: Returns the stock entries consumed when the menu was created, ordered by the original stock allocation.
      operationId: listMenuUsedStock
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Consumed stock entries returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MenuUsedStockResponse'
        '404':
          description: Menu not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/menus/{id}/shopping-list:
    get:
      tags:
        - Menus
      summary: List shopping list for menu
      description: Returns the products and missing units saved after applying stock when the week was established. An optional supermarket filter returns products available there and products without any supermarket assignment. This operation does not recalculate the week, consume stock, or persist a supermarket selection.
      operationId: listMenuShoppingList
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: supermarketId
          in: query
          required: false
          description: Optional supermarket identifier used to filter available products
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Shopping list returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MenuShoppingListItemResponse'
        '404':
          description: Menu or supermarket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/menus/{id}/week-stock:
    get:
      tags:
        - Menus
      summary: List week stock
      description: Returns the temporary stock tracked for the established week as individual lines, including quantity and unit price, separate from the global product stock.
      operationId: listMenuWeekStock
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Week stock returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WeekStockItemResponse'
        '404':
          description: Menu not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    post:
      tags:
        - Menus
      summary: Transfer stock entry to week stock
      description: Consumes quantity from an existing global stock entry, appends it as an individual temporary stock line with the source unit price, and recalculates the shopping list without charging a money box.
      operationId: transferStockToWeekStock
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMenuStockTransferRequest'
            example:
              stockEntryId: 7
              quantity: 1.5
      responses:
        '200':
          description: Stock entry transferred to week stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuResponse'
        '400':
          description: Transfer payload is invalid or the menu cannot be modified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Menu, stock entry, or product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    put:
      tags:
        - Menus
      summary: Replace week stock
      description: Replaces the temporary stock tracked for the established week with individual lines, storing both quantity and unit price for each line, and updates the shopping list accordingly.
      operationId: replaceMenuWeekStock
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCurrentWeekMenuStockRequest'
            example:
              weekStock:
                - productId: 1
                  quantity: 1.5
                  price: 2.49
                - productId: 1
                  quantity: 0.5
                  price: 1.99
      responses:
        '200':
          description: Week stock updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuResponse'
        '400':
          description: Week stock payload is invalid or the menu cannot be modified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Menu or product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/menus/{id}/close:
    post:
      tags:
        - Menus
      summary: Close menu
      description: Closes a menu after its end date, saves statistics, and records an immutable snapshot for every selected person.
      operationId: closeMenu
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloseMenuRequest'
            example:
              personIds: [1, 2]
      responses:
        '200':
          description: Menu closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuStatsResponse'
        '400':
          description: Menu cannot be closed yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Menu or selected person not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/users:
    get:
      tags: [Users]
      summary: List people
      description: Returns the people available for selection when closing a menu.
      operationId: listUsers
      responses:
        '200':
          description: People returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
  /api/v1/users/{personId}/menu-history/monthly:
    get:
      tags: [Users]
      summary: Get monthly menu history
      description: Returns immutable closed-menu snapshots assigned to one person during a month. Equivalent to requesting the monthly date range.
      operationId: getMonthlyUserMenuHistory
      parameters:
        - {name: personId, in: path, required: true, schema: {type: integer, format: int64}}
        - {name: year, in: query, required: true, schema: {type: integer, example: 2026}}
        - {name: month, in: query, required: true, schema: {type: integer, minimum: 1, maximum: 12}}
      responses:
        '200':
          description: Monthly history returned
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserMenuHistoryResponse'}
        '400':
          description: Invalid period
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
        '404':
          description: Person not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
  /api/v1/users/{personId}/menu-history:
    get:
      tags: [Users]
      summary: Get menu history by range
      description: Returns immutable closed-menu snapshots assigned to one person in an inclusive date-time range.
      operationId: getUserMenuHistoryByRange
      parameters:
        - {name: personId, in: path, required: true, schema: {type: integer, format: int64}}
        - {name: from, in: query, required: true, schema: {type: string, format: date-time}, example: '2026-06-01T00:00:00Z'}
        - {name: to, in: query, required: true, schema: {type: string, format: date-time}, example: '2026-06-30T23:59:59Z'}
      responses:
        '200':
          description: History returned
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserMenuHistoryResponse'}
        '400':
          description: Invalid period
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
        '404':
          description: Person not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
  /api/v1/users/{personId}/menu-history/annual:
    get:
      tags: [Users]
      summary: Get annual menu history
      description: Returns immutable closed-menu snapshots assigned to one person during a year. Equivalent to requesting the annual date range.
      operationId: getAnnualUserMenuHistory
      parameters:
        - {name: personId, in: path, required: true, schema: {type: integer, format: int64}}
        - {name: year, in: query, required: true, schema: {type: integer, example: 2026}}
      responses:
        '200':
          description: Annual history returned
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserMenuHistoryResponse'}
        '400':
          description: Invalid period
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
        '404':
          description: Person not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
  /api/v1/users/{userId}/weights:
    post:
      tags: [User weights]
      summary: Record user weight
      description: Stores a weight in kilograms with its exact measurement date and time.
      operationId: createUserWeight
      parameters:
        - {name: userId, in: path, required: true, schema: {type: integer, format: int64}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateUserWeightRequest'}
      responses:
        '201':
          description: Weight recorded
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserWeightResponse'}
        '400':
          description: Invalid request
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
        '404':
          description: User not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
    get:
      tags: [User weights]
      summary: List user weights by period
      description: Returns measurements in an inclusive date-time period, ordered from oldest to newest.
      operationId: listUserWeights
      parameters:
        - {name: userId, in: path, required: true, schema: {type: integer, format: int64}}
        - {name: from, in: query, required: true, schema: {type: string, format: date-time}, example: '2026-06-01T00:00:00Z'}
        - {name: to, in: query, required: true, schema: {type: string, format: date-time}, example: '2026-06-30T23:59:59Z'}
      responses:
        '200':
          description: Weight measurements returned
          content:
            application/json:
              schema:
                type: array
                items: {$ref: '#/components/schemas/UserWeightResponse'}
        '400':
          description: Invalid period
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
        '404':
          description: User not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
  /api/v1/users/{userId}/weights/stats:
    get:
      tags: [User weights]
      summary: Get user weight statistics
      description: Returns the highest and lowest measurements, including their exact dates and times, in an inclusive period. For tied weights, the oldest measurement is returned.
      operationId: getUserWeightStats
      parameters:
        - {name: userId, in: path, required: true, schema: {type: integer, format: int64}}
        - {name: from, in: query, required: true, schema: {type: string, format: date-time}, example: '2026-06-01T00:00:00Z'}
        - {name: to, in: query, required: true, schema: {type: string, format: date-time}, example: '2026-06-30T23:59:59Z'}
      responses:
        '200':
          description: Weight statistics returned
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserWeightStatsResponse'}
        '400':
          description: Invalid period
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
        '404':
          description: User not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
  /api/v1/users/{userId}/weights/{weightId}:
    put:
      tags: [User weights]
      summary: Update user weight
      description: Replaces the weight and exact measurement date and time. The measurement must belong to the user in the path.
      operationId: updateUserWeight
      parameters:
        - {name: userId, in: path, required: true, schema: {type: integer, format: int64}}
        - {name: weightId, in: path, required: true, schema: {type: integer, format: int64}}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/UpdateUserWeightRequest'}
      responses:
        '200':
          description: Weight measurement updated
          content:
            application/json:
              schema: {$ref: '#/components/schemas/UserWeightResponse'}
        '400':
          description: Invalid request
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
        '404':
          description: Weight measurement not found for user
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
    delete:
      tags: [User weights]
      summary: Delete user weight
      description: Deletes a weight measurement only when it belongs to the user in the path.
      operationId: deleteUserWeight
      parameters:
        - {name: userId, in: path, required: true, schema: {type: integer, format: int64}}
        - {name: weightId, in: path, required: true, schema: {type: integer, format: int64}}
      responses:
        '204':
          description: Weight measurement deleted
        '404':
          description: Weight measurement not found for user
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ApiError'}
  /api/v1/menus/{id}/stats:
    get:
      tags:
        - Menus
      summary: Get menu stats
      description: Returns the saved period and month statistics captured when the menu was closed.
      operationId: getMenuStats
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Menu stats returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuStatsResponse'
        '404':
          description: Menu stats not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/menus/stats:
    get:
      tags:
        - Menus
      summary: Get menu stats for a date range
      description: Returns the aggregated calories, estimated cost, distinct products, and included menu identifiers for the menus whose planned days fall inside the requested inclusive date range.
      operationId: getMenuRangeStats
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
            example: '2026-06-01'
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
            example: '2026-06-30'
      responses:
        '200':
          description: Range stats returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuRangeStatsResponse'
        '400':
          description: Range is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/planning/day-parts:
    get:
      tags:
        - Planning
      summary: List planning day parts
      description: Returns all reusable day parts ordered by the configured sort order and identifier.
      operationId: listPlanningDayParts
      responses:
        '200':
          description: Day parts returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlanningDayPartResponse'
    post:
      tags:
        - Planning
      summary: Create planning day part
      description: Creates a reusable day part that can later be referenced by planning days.
      operationId: createPlanningDayPart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanningDayPartRequest'
            examples:
              default:
                value:
                  name: Lunch
                  description: Main meal of the day
                  sortOrder: 20
      responses:
        '201':
          description: Day part created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanningDayPartResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/planning/day-parts/{id}:
    put:
      tags:
        - Planning
      summary: Update planning day part
      description: Updates an existing reusable day part configuration.
      operationId: updatePlanningDayPart
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanningDayPartRequest'
            examples:
              default:
                value:
                  name: Snack
                  description: Afternoon snack
                  sortOrder: 30
      responses:
        '200':
          description: Day part updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanningDayPartResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Day part not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/media/{id}:
    get:
      security: []
      tags:
        - Media
      summary: Download media
      description: Returns the binary content of a stored media file.
      operationId: downloadMedia
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: expiresAt
          in: query
          required: false
          description: Unix epoch seconds when the signed media URL expires. Required when the request does not include a Bearer token.
          schema:
            type: integer
            format: int64
          example: 1781611200
        - name: signature
          in: query
          required: false
          description: HMAC signature for direct media downloads. Required when the request does not include a Bearer token.
          schema:
            type: string
          example: 5f2a...
      responses:
        '200':
          description: Media returned
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        '404':
          description: Media not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/health:
    get:
      security: []
      tags:
        - Health
      summary: API status
      description: Returns a simple availability indicator.
      operationId: health
      responses:
        '200':
          description: API available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                default:
                  value:
                    status: UP
components:
  schemas:
    ApiError:
      type: object
      properties:
        status:
          type: integer
          example: 400
        error:
          type: string
          example: Bad Request
        message:
          type: string
          example: Invalid request body
        path:
          type: string
          example: /api/v1/products
        timestamp:
          type: string
          format: date-time
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: UP
    RegisterRequest:
      type: object
      required:
        - username
        - password
        - registrationCode
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 80
          description: Unique username used to log in
          example: elias
        password:
          type: string
          minLength: 8
          maxLength: 128
          description: Plain password. It is hashed before storage.
          example: correct-horse-battery-staple
        registrationCode:
          type: string
          maxLength: 128
          description: Shared registration code required to create a user
          example: foodhelper-invite
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Registered username
          example: elias
        password:
          type: string
          description: User password
          example: correct-horse-battery-staple
    AuthResponse:
      type: object
      properties:
        userId:
          type: integer
          format: int64
          description: Created or authenticated user identifier
          example: 1
        username:
          type: string
          description: Authenticated username
          example: elias
        accessToken:
          type: string
          description: JWT access token for Authorization headers
        tokenType:
          type: string
          description: Authorization scheme
          example: Bearer
        expiresAt:
          type: string
          format: date-time
          description: Instant when the access token expires
    CreateProductRequest:
      type: object
      required:
        - name
        - description
        - gramsPerUnit
        - calories
        - carbohydrates
        - proteins
        - fats
      properties:
        name:
          type: string
          minLength: 1
          description: Product name
          example: Apple
        description:
          type: string
          minLength: 1
          description: Product description
          example: Fresh apple
        gramsPerUnit:
          type: number
          exclusiveMinimum: 0
          description: Default grams represented by one unit of this product
          example: 150
        defaultPrice:
          type: number
          minimum: 0
          nullable: true
          description: Optional default price for this product
          example: 2.49
        calories:
          type: number
          minimum: 0
          description: Calories per 100 grams
          example: 52
        carbohydrates:
          type: number
          minimum: 0
          description: Carbohydrates per 100 grams
          example: 14
        proteins:
          type: number
          minimum: 0
          description: Proteins per 100 grams
          example: 0.3
        fats:
          type: number
          minimum: 0
          description: Fats per 100 grams
          example: 0.2
        photo:
          $ref: '#/components/schemas/PhotoUploadRequest'
        supermarketIds:
          type: array
          description: Supermarket identifiers where the product is available
          items:
            type: integer
            format: int64
    CreateStockEntryRequest:
      type: object
      required:
        - quantity
        - price
        - entryDate
      properties:
        quantity:
          type: number
          exclusiveMinimum: 0
          description: Available quantity for this stock entry
          example: 6.5
        price:
          type: number
          minimum: 0
          description: Price paid for this stock entry
          example: 4.99
        expirationDate:
          type: string
          format: date
          nullable: true
          description: Stock expiration date when available
          example: 2026-06-20
        entryDate:
          type: string
          format: date
          description: Date when the stock entry was received
          example: 2026-06-10
    UpdateStockEntryRequest:
      type: object
      required:
        - quantity
        - price
        - entryDate
      properties:
        quantity:
          type: number
          exclusiveMinimum: 0
          description: Available quantity for this stock entry
          example: 6.5
        price:
          type: number
          minimum: 0
          description: Price paid for this stock entry
          example: 4.99
        expirationDate:
          type: string
          format: date
          nullable: true
          description: Stock expiration date when available
          example: 2026-06-20
        entryDate:
          type: string
          format: date
          description: Date when the stock entry was received
          example: 2026-06-10
    AdjustStockQuantityRequest:
      type: object
      required:
        - quantity
      properties:
        quantity:
          type: number
          exclusiveMinimum: 0
          description: Quantity to add or remove
          example: 2
    UpdateProductRequest:
      allOf:
        - $ref: '#/components/schemas/CreateProductRequest'
    ProductResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Product identifier
          example: 1
        name:
          type: string
          description: Product name
          example: Apple
        description:
          type: string
          description: Product description
          example: Fresh apple
        gramsPerUnit:
          type: number
          description: Default grams represented by one unit of this product
          example: 150
        nutritionBasis:
          type: string
          description: Nutrition basis used by this product
          example: PER_100_GRAMS
        defaultPrice:
          type: number
          nullable: true
          description: Optional default price for this product
          example: 2.49
        nutritionalValues:
          $ref: '#/components/schemas/NutritionalValuesResponse'
        photo:
          oneOf:
            - type: string
              description: Signed photo URL that expires with the authentication token lifetime
              example: /api/v1/media/12?expiresAt=1781611200&signature=5f2a...
            - type: 'null'
        supermarkets:
          type: array
          description: Supermarkets where the product is available
          items:
            $ref: '#/components/schemas/SupermarketResponse'
        derivedProduct:
          oneOf:
            - $ref: '#/components/schemas/RecipeDerivedProductResponse'
            - type: 'null'
    SupermarketRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 150
          description: Unique supermarket name
          example: Mercadona
    SupermarketResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Supermarket identifier
          example: 1
        name:
          type: string
          description: Supermarket name
          example: Mercadona
    ProductPageResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductResponse'
        page:
          type: integer
          format: int32
          description: Zero-based page number
          example: 0
        size:
          type: integer
          format: int32
          description: Requested page size
          example: 20
        totalElements:
          type: integer
          format: int64
          description: Total number of products
          example: 42
        totalPages:
          type: integer
          format: int32
          description: Total number of pages
          example: 3
    ProductStatsMetricResponse:
      type: object
      properties:
        productId:
          type: integer
          format: int64
          nullable: true
          description: Product identifier when the catalog has data
          example: 1
        productName:
          type: string
          description: Product name or fallback label when there is no data
          example: Chicken breast
        value:
          type: number
          description: Metric value
          example: 165
        message:
          type: string
          nullable: true
          description: Fallback label for empty catalogs
          example: Sin datos
    ProductStatsTotalsResponse:
      type: object
      properties:
        totalQuantity:
          type: number
          description: Total quantity across all stock entries
          example: 18.5
        batchCount:
          type: integer
          format: int64
          description: Number of stock entries
          example: 3
    ProductStatsSummaryResponse:
      type: object
      properties:
        productId:
          type: integer
          format: int64
          description: Product identifier
          example: 1
        productName:
          type: string
          description: Product name
          example: Chicken breast
        totalQuantity:
          type: number
          description: Total quantity aggregated across all stock entries for this product
          example: 12.5
        batchCount:
          type: integer
          format: int64
          description: Number of stock entries for this product
          example: 2
        nextExpirationDate:
          type: string
          format: date
          nullable: true
          description: Earliest expiration date among this product's stock entries
          example: 2026-06-20
        nextExpirationMessage:
          type: string
          nullable: true
          description: Fallback label when the product has no stock or no expiration dates
          example: Sin caducidad
    ProductStatsExpirationResponse:
      type: object
      properties:
        productId:
          type: integer
          format: int64
          nullable: true
          description: Product identifier when an expiring lot exists
          example: 1
        productName:
          type: string
          description: Product name when an expiring lot exists
          example: Chicken breast
        quantity:
          type: number
          nullable: true
          description: Quantity of the earliest expiring stock entry
          example: 2
        expirationDate:
          type: string
          format: date
          nullable: true
          description: Earliest expiration date across all stock entries
          example: 2026-06-20
        message:
          type: string
          nullable: true
          description: Fallback label when there are no lots or no expiring lots
          example: Sin caducidad
    ProductStatsResponse:
      type: object
      properties:
        caloriesTop:
          $ref: '#/components/schemas/ProductStatsMetricResponse'
        carbohydratesTop:
          $ref: '#/components/schemas/ProductStatsMetricResponse'
        proteinsTop:
          $ref: '#/components/schemas/ProductStatsMetricResponse'
        fatsTop:
          $ref: '#/components/schemas/ProductStatsMetricResponse'
        stock:
          $ref: '#/components/schemas/ProductStatsTotalsResponse'
        earliestExpiration:
          $ref: '#/components/schemas/ProductStatsExpirationResponse'
        summaries:
          type: array
          items:
            $ref: '#/components/schemas/ProductStatsSummaryResponse'
    StockEntryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Stock entry identifier
          example: 3
        productId:
          type: integer
          format: int64
          description: Linked product identifier
          example: 1
        productName:
          type: string
          description: Linked product name
          example: Apple
        quantity:
          type: number
          description: Available quantity in this stock entry
          example: 6.5
        price:
          type: number
          description: Price paid for this stock entry
          example: 4.99
        expirationDate:
          type: string
          format: date
          nullable: true
          description: Stock expiration date when available
          example: 2026-06-20
        entryDate:
          type: string
          format: date
          description: Date when the stock entry was received
          example: 2026-06-10
