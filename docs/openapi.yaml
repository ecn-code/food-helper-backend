          type: integer
          format: int64
          description: Planning identifier
          example: 1
        users:
          type: integer
          format: int32
          nullable: true
          description: Number of users covered by the planning
          example: 4
        startDate:
          type: string
          format: date
          description: First date covered by the planning
          example: 2026-06-15
        endDate:
          type: string
          format: date
          description: Last date covered by the planning
          example: 2026-06-22
        days:
