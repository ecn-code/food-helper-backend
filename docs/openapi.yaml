          example: 2026-06-22
        days:
          type: array
          description: Saved day menus in the menu period
          items:
            $ref: '#/components/schemas/PlanningDayResponse'
        nutritionalValues:
          $ref: '#/components/schemas/NutritionalValuesResponse'
        stockSummary:
          $ref: '#/components/schemas/PlanningStockSummaryResponse'
        usedStock:
          type: array
          description: Stock entries consumed to satisfy the menu period
          items:
            $ref: '#/components/schemas/MenuUsedStockResponse'
        weekStock:
          type: array
          description: Temporary stock tracked for the established week
          items:
            $ref: '#/components/schemas/WeekStockItemResponse'
        shoppingList:
          type: array
          description: Products still missing after consuming stock
          items:
            $ref: '#/components/schemas/MenuShoppingListItemResponse'
        recipeProductions:
          type: array
          description: Recipe productions stored in the menu snapshot with their transfer trace
          items:
            $ref: '#/components/schemas/MenuRecipeProductionResponse'
        nutritionalRules:
          $ref: '#/components/schemas/NutritionalRulesEvaluationResponse'
        state:
          type: string
          enum: [ESTABLISHED, CLOSED]
          description: Lifecycle state of the menu snapshot
          example: ESTABLISHED
        isActive:
          type: boolean
          description: Whether the menu is the currently active one
          example: true
        canEdit:
          type: boolean
          description: Whether the menu can still be edited
          example: true
        canDelete:
          type: boolean
          description: Whether the menu can be deleted
          example: true
        canClose:
          type: boolean
          description: Whether the menu can be closed
          example: true
        canUndo:
          type: boolean
          description: Whether the menu can be undone
          example: true
    MenuPageResponse:
      type: object
      description: Paginated list of menu snapshots
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/MenuResponse'
        page:
          type: integer
          format: int32
          description: Zero-based page number
          example: 0
        size:
          type: integer
          format: int32
          description: Requested page size
          example: 20
        totalElements:
          type: integer
          format: int64
          description: Total number of menus
          example: 42
        totalPages:
          type: integer
          format: int32
          description: Total number of pages
          example: 3
    CloseMenuRequest:
      type: object
      required: [personIds]
      properties:
        personIds:
          type: array
          minItems: 1
          uniqueItems: true
          description: People who followed the menu and receive an immutable history entry
          items:
            type: integer
            format: int64
          example: [1, 2]
    UserResponse:
      type: object
      properties:
        id: {type: integer, format: int64, example: 1}
        username: {type: string, example: elias}
    CreateUserWeightRequest:
      type: object
      required: [weight, recordedAt]
      properties:
        weight:
          type: number
          exclusiveMinimum: 0
          description: Weight in kilograms
          example: 72.35
        recordedAt:
          type: string
          format: date-time
          description: Exact date and time when the weight was recorded
          example: '2026-06-28T08:30:00Z'
        notes:
          type: string
          nullable: true
          description: Optional note attached to the measurement
          example: After breakfast
    UpdateUserWeightRequest:
      type: object
      required: [weight, recordedAt]
      properties:
        weight:
          type: number
          exclusiveMinimum: 0
          description: Weight in kilograms
          example: 71.80
        recordedAt:
          type: string
          format: date-time
          description: Exact date and time when the weight was recorded
          example: '2026-06-29T08:15:00Z'
    UserWeightResponse:
      type: object
      properties:
        id: {type: integer, format: int64, example: 1}
        userId: {type: integer, format: int64, example: 1}
        weight: {type: number, description: Weight in kilograms, example: 72.35}
        recordedAt: {type: string, format: date-time, example: '2026-06-28T08:30:00Z'}
        notes:
          type: string
          nullable: true
          description: Optional note attached to the measurement
          example: After breakfast
    UserWeightStatsResponse:
      type: object
      properties:
        userId: {type: integer, format: int64, example: 1}
        from: {type: string, format: date-time, example: '2026-06-01T00:00:00Z'}
        to: {type: string, format: date-time, example: '2026-06-30T23:59:59Z'}
        highest:
          description: Highest measurement, or null when the period has no measurements
          oneOf:
            - {$ref: '#/components/schemas/UserWeightResponse'}
            - {type: 'null'}
        lowest:
          description: Lowest measurement, or null when the period has no measurements
          oneOf:
            - {$ref: '#/components/schemas/UserWeightResponse'}
            - {type: 'null'}
    UserMenuHistoryResponse:
      type: object
      properties:
        personId: {type: integer, format: int64, example: 1}
        personName: {type: string, example: elias}
        from: {type: string, format: date-time, example: '2026-06-01T00:00:00Z'}
        to: {type: string, format: date-time, example: '2026-06-30T23:59:59Z'}
        totals: {$ref: '#/components/schemas/MenuPeriodStatsResponse'}
        menus:
          type: array
          items: {$ref: '#/components/schemas/UserMenuHistoryEntryResponse'}
    UserMenuHistoryEntryResponse:
      type: object
      properties:
        menuId: {type: integer, format: int64, example: 1}
        startDate: {type: string, format: date}
        endDate: {type: string, format: date}
