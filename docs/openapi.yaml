openapi: 3.1.0
info:
  title: FoodHelper API
  version: v1
  description: API for managing products and their nutritional values.
servers:
  - url: /
    description: Current server
tags:
  - name: Products
    description: Create, update, and delete product operations
  - name: Health
    description: Basic API status
paths:
  /api/v1/products:
    post:
      tags:
        - Products
      summary: Create product
      description: Creates a product with name, description, and nutritional values.
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
            examples:
              default:
                value:
                  name: Apple
                  description: Fresh apple
                  calories: 52
                  carbohydrates: 14
                  proteins: 0.3
                  fats: 0.2
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflict while creating the product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/products/{id}:
    put:
      tags:
        - Products
      summary: Update product
      description: Updates an existing product and replaces its nutritional data.
      operationId: updateProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
            examples:
              default:
                value:
                  name: Green Apple
                  description: Green apple
                  calories: 48
                  carbohydrates: 13
                  proteins: 0.4
                  fats: 0.1
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
        '409':
          description: Conflict while updating the product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
    delete:
      tags:
        - Products
      summary: Delete product
      description: Deletes a product by identifier.
      operationId: deleteProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Product deleted
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /api/v1/health:
    get:
      tags:
        - Health
      summary: API status
      description: Returns a simple availability indicator.
      operationId: health
      responses:
        '200':
          description: API available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                default:
                  value:
                    status: UP
components:
  schemas:
    CreateProductRequest:
      type: object
      required:
        - name
        - description
        - calories
        - carbohydrates
        - proteins
        - fats
      properties:
        name:
          type: string
          minLength: 1
          description: Product name
          example: Apple
        description:
          type: string
          minLength: 1
          description: Product description
          example: Fresh apple
        calories:
          type: number
          description: Calories per serving
          example: 52
          minimum: 0
        carbohydrates:
          type: number
          description: Carbohydrates per serving
          example: 14
          minimum: 0
        proteins:
          type: number
          description: Proteins per serving
          example: 0.3
          minimum: 0
        fats:
          type: number
          description: Fats per serving
          example: 0.2
          minimum: 0
    UpdateProductRequest:
      type: object
      required:
        - name
        - description
        - calories
        - carbohydrates
        - proteins
        - fats
      properties:
        name:
          type: string
          minLength: 1
          description: Product name
          example: Green Apple
        description:
          type: string
          minLength: 1
          description: Product description
          example: Green apple
        calories:
          type: number
          description: Calories per serving
          example: 48
          minimum: 0
        carbohydrates:
          type: number
          description: Carbohydrates per serving
          example: 13
          minimum: 0
        proteins:
          type: number
          description: Proteins per serving
          example: 0.4
          minimum: 0
        fats:
          type: number
          description: Fats per serving
          example: 0.1
          minimum: 0
    ProductResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Product identifier
          example: 1
        name:
          type: string
          description: Product name
          example: Apple
        description:
          type: string
          description: Product description
          example: Fresh apple
        nutritionalValues:
          $ref: '#/components/schemas/NutritionalValuesResponse'
    NutritionalValuesResponse:
      type: object
      properties:
        calories:
          type: number
          description: Calories
          example: 52
        carbohydrates:
          type: number
          description: Carbohydrates
          example: 14
        proteins:
          type: number
          description: Proteins
          example: 0.3
        fats:
          type: number
          description: Fats
          example: 0.2
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          description: API status
          example: UP
    ApiError:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          description: Time when the error occurred
        status:
          type: integer
          description: HTTP status code
          example: 400
        error:
          type: string
          description: Short HTTP error name
          example: Bad Request
        message:
          type: string
          description: Functional error detail
          example: name must not be blank
        path:
          type: string
          description: Request path where the error occurred
          example: /api/v1/products
