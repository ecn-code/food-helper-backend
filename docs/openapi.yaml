    CreateProposedWeekMenuRequest:
      description: Payload for starting an empty proposed week menu. The date range cannot span more than 7 days.
      type: object
      required:
        - startDate
        - endDate
      properties:
        startDate:
          type: string
          format: date
          description: First date covered by the proposed menu
          example: 2026-06-15
        endDate:
          type: string
          format: date
          description: Last date covered by the proposed menu
          example: 2026-06-21
    UpsertProposedWeekMenuDayRequest:
      type: object
      required:
        - date
        - sections
      properties:
        date:
          type: string
          format: date
          description: Date of the proposed day menu
          example: 2026-06-15
        sections:
          type: array
          minItems: 1
          description: Configured day parts selected for the day. Each day part can appear only once.
          items:
            $ref: '#/components/schemas/ProposedWeekMenuSectionRequest'
    ProposedWeekMenuSectionRequest:
      type: object
      required:
        - dayPartId
        - products
      properties:
        dayPartId:
          type: integer
          format: int64
          description: Reusable day part identifier
          example: 1
        products:
          type: array
          minItems: 1
          description: Ordered products consumed in this section
          items:
            $ref: '#/components/schemas/ProposedWeekMenuProductRequest'
    ProposedWeekMenuProductRequest:
      type: object
      required:
        - productId
        - sortOrder
      properties:
        productId:
          type: integer
          format: int64
          description: Product identifier
          example: 1
        units:
          type: number
          exclusiveMinimum: 0
          nullable: true
          description: Consumed units. Defaults to 1 when omitted.
          example: 2
        grams:
          type: number
          exclusiveMinimum: 0
          nullable: true
          description: Consumed grams. Defaults to product gramsPerUnit multiplied by units when omitted.
          example: 300
        sortOrder:
          type: integer
          format: int32
          minimum: 0
          description: Explicit display order within the section
          example: 10
    ProposedWeekMenuResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Proposed menu identifier
          example: 1
        startDate:
          type: string
          format: date
          description: First date covered by the proposed menu
          example: 2026-06-15
        endDate:
          type: string
          format: date
          description: Last date covered by the proposed menu
          example: 2026-06-21
        days:
          type: array
          description: Existing proposed day menus. A proposed week menu may start empty.
