          example: Apple
        description:
          type: string
          minLength: 1
          description: Product description
          example: Fresh apple
        gramsPerUnit:
          type: number
          exclusiveMinimum: 0
          description: Default grams represented by one unit of this product
          example: 150
        defaultPrice:
          type: number
          minimum: 0
          nullable: true
          description: Optional default price for this product
          example: 2.49
        calories:
          type: number
          minimum: 0
          description: Calories per 100 grams
          example: 52
        carbohydrates:
          type: number
          minimum: 0
          description: Carbohydrates per 100 grams
          example: 14
        proteins:
          type: number
          minimum: 0
          description: Proteins per 100 grams
          example: 0.3
        fats:
          type: number
          minimum: 0
          description: Fats per 100 grams
          example: 0.2
        photo:
          $ref: '#/components/schemas/PhotoUploadRequest'
    CreateStockEntryRequest:
      type: object
      required:
        - quantity
        - price
        - entryDate
      properties:
        quantity:
          type: number
          exclusiveMinimum: 0
          description: Available quantity for this stock entry
          example: 6.5
        price:
          type: number
          minimum: 0
          description: Price paid for this stock entry
          example: 4.99
        expirationDate:
          type: string
          format: date
          nullable: true
          description: Stock expiration date when available
          example: 2026-06-20
        entryDate:
          type: string
          format: date
          description: Date when the stock entry was received
          example: 2026-06-10
    AdjustStockQuantityRequest:
      type: object
      required:
        - quantity
      properties:
        quantity:
          type: number
          exclusiveMinimum: 0
          description: Quantity to add or remove
          example: 2
    UpdateProductRequest:
      allOf:
        - $ref: '#/components/schemas/CreateProductRequest'
    ProductResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Product identifier
          example: 1
        name:
          type: string
          description: Product name
          example: Apple
        description:
          type: string
          description: Product description
          example: Fresh apple
        gramsPerUnit:
          type: number
          description: Default grams represented by one unit of this product
          example: 150
        defaultPrice:
          type: number
          nullable: true
          description: Optional default price for this product
          example: 2.49
        nutritionalValues:
          $ref: '#/components/schemas/NutritionalValuesResponse'
        photo:
          oneOf:
            - type: string
              description: Signed photo URL that expires with the authentication token lifetime
