        couponCodes:
          type: array
          nullable: true
          description: Stable coupon codes to validate against the planning
          items:
            type: string
          example: [NO_REPEATED_PRODUCTS]
    PlanningCouponUnavailabilityReason:
      type: string
      enum: [CONDITION_NOT_MET, USED_WITHIN_PERIOD]
    PlanningResponse:
      type: object
