        recipeId:
          type: integer
          format: int64
          description: Recipe identifier
          example: 12
        recipeName:
          type: string
          description: Recipe name
          example: Chicken curry
        productId:
          type: integer
          format: int64
          description: Product identifier created from the recipe
          example: 22
        productName:
          type: string
          description: Product name created from the recipe
