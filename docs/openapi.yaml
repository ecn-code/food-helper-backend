          example: 18
    PlanningCouponResponse:
      type: object
      required: [code, name, conditionDescription, conditionMet, rewardAmount, periodDays, available, usedRecently, informativeAvailabilityState]
      properties:
        code:
          type: string
          description: Stable coupon code
          example: NO_REPEATED_PRODUCTS
        name:
          type: string
          description: Coupon display name
          example: No repeated products
        conditionDescription:
          type: string
          description: Human-readable rule that the coupon requires
          example: The menu must fill every planned day with at least 3 products and cannot repeat the same product on the same day or in the same day part across different days
        conditionMet:
          type: boolean
          description: Whether the current evaluation context satisfies the coupon rule. Listing mode only checks cooldown, while validation and redemption also check the planning.
          example: true
        rewardAmount:
          type: number
          format: double
          description: Money added to the user's money box when redeemed
          example: 15.00
        periodDays:
          type: integer
          format: int32
          description: Cooldown in days before the coupon can be used again
          example: 30
        available:
          type: boolean
          description: Whether the coupon can be redeemed now
          example: true
        usedRecently:
          type: boolean
          description: Whether the coupon was used recently and is still inside the cooldown window
          example: false
        informativeAvailabilityState:
          $ref: '#/components/schemas/PlanningCouponAvailabilityState'
        lastUsedAt:
          type: string
          format: date-time
          nullable: true
          description: Instant when the coupon was last redeemed, or null if never used
          example: 2026-06-01T10:15:30Z
        nextAvailableAt:
          type: string
          format: date-time
          nullable: true
          description: Instant when the coupon becomes available again after cooldown, or null when it is blocked only by the planning conditions
          example: 2026-07-01T10:15:30Z
        unavailableReasons:
          type: array
          nullable: true
          description: Reasons why the coupon cannot be redeemed now
          items:
            $ref: '#/components/schemas/PlanningCouponUnavailabilityReason'
    CouponResponse:
      type: object
      required: [code, name, conditionDescription, available]
      properties:
        code:
          type: string
          description: Stable coupon code
          example: NO_REPEATED_PRODUCTS
        name:
          type: string
          description: Coupon display name
          example: No repeated products
        conditionDescription:
          type: string
          description: Human-readable rule that the coupon requires
          example: The menu must fill every planned day with at least 3 products and cannot repeat the same product on the same day or in the same day part across different days
        available:
          type: boolean
          description: Whether the coupon can be redeemed now
          example: true
        unavailableReasons:
          type: array
          description: Reasons why the coupon cannot be redeemed now
          items:
            $ref: '#/components/schemas/PlanningCouponUnavailabilityReason'
    PlanningCouponAvailabilityState:
      type: string
      enum: [AVAILABLE, CONDITION_NOT_MET, USED_RECENTLY, CONDITION_NOT_MET_AND_USED_RECENTLY]
