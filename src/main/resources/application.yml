spring:
  application:
    name: foodhelper-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/foodhelper}
    username: ${SPRING_DATASOURCE_USERNAME:foodhelper}
    password: ${SPRING_DATASOURCE_PASSWORD:foodhelper}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
  flyway:
    enabled: true
  cloud:
    function:
      definition: productHttpHandler

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /v3/api-docs

app:
  cors:
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://192.168.1.133}
  auth:
    registration-code: ${APP_AUTH_REGISTRATION_CODE:foodhelper-invite}
    jwt:
      secret: ${APP_AUTH_JWT_SECRET:foodhelper-development-secret-change-me}
      issuer: ${APP_AUTH_JWT_ISSUER:foodhelper-api}
      expiration-seconds: ${APP_AUTH_JWT_EXPIRATION_SECONDS:3600}
  media:
    max-bytes: ${APP_MEDIA_MAX_BYTES:153600}
    max-dimension: ${APP_MEDIA_MAX_DIMENSION:1280}

---
spring:
  config:
    activate:
      on-profile: lambda
  main:
    web-application-type: none

---
spring:
  config:
    activate:
      on-profile: test-integration

app:
  auth:
    registration-code: test-registration-code
